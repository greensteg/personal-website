<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Wentong Zhang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- Navigation will be inserted here by JavaScript -->

    <!-- Contact Page -->
    <section class="min-h-screen py-20 pt-32">
        <div class="max-w-4xl mx-auto px-6">
            <div id="contactContent" class="max-w-2xl">
                <!-- Contact content will be loaded here -->
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/nav.js"></script>
    <script>
        // Initialize navigation
        initNavigation('contact');

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderMarkdownContent('contactContent', 'content/contact.md');
        });
    </script>
</body>
</html>
