<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Wentong Zhang</title>
    <meta name="description" content="An essay by Wentong Zhang.">
    <link rel="canonical" href="https://www.wentongzhang.com/post.html">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <meta property="og:title" content="Post - Wentong Zhang">
    <meta property="og:description" content="An essay by Wentong Zhang.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://www.wentongzhang.com/post.html">
    <meta property="og:site_name" content="Wentong Zhang">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Post - Wentong Zhang">
    <meta name="twitter:description" content="An essay by Wentong Zhang.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">
    <!-- Navigation will be inserted here by JavaScript -->

    <!-- Single Post View -->
    <section class="min-h-screen py-12 sm:py-20 pt-20 sm:pt-32">
        <div class="max-w-3xl mx-auto px-4 sm:px-6">
            <a href="thoughts.html" class="text-blue-600 hover:text-blue-700 mb-6 sm:mb-8 flex items-center transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded px-2 py-1 text-sm sm:text-base">
                ← Back to Thoughts
            </a>
            <div id="singlePostContent">
                <div class="max-w-2xl">
                    <p class="text-gray-500 text-sm sm:text-base">Loading post...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared/meta.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/mtg.js"></script>
    <script src="shared/nav.js"></script>
    <script>
        // Initialize navigation
        initNavigation('thoughts');

        // Get post key from URL parameters. Slugs are preferred; IDs remain supported.
        function getPostKeyFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                slug: urlParams.get('slug'),
                id: parseInt(urlParams.get('id')) || null
            };
        }

        // Auto-discover blog posts from index file
        async function discoverBlogPosts() {
            try {
                const response = await fetch('content/posts/index.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const postsIndex = await response.json();
                return postsIndex.posts || [];
            } catch (error) {
                console.error('Failed to load posts index:', error);
                return [];
            }
        }

        // Find and load specific post
        async function loadPost(postKey) {
            const postFiles = await discoverBlogPosts();
            
            // Find the post file by loading each one and checking the ID
            for (const postFile of postFiles) {
                const content = await loadContent(postFile);
                if (content) {
                    const { frontMatter, content: markdownContent } = parseFrontMatter(content);
                    const slug = frontMatter.slug || postFile.split('/').pop().replace('.md', '');
                    const id = parseInt(frontMatter.id);
                    const matchesSlug = postKey.slug && slug === postKey.slug;
                    const matchesId = postKey.id && id === postKey.id;

                    if (matchesSlug || matchesId) {
                        return {
                            id,
                            slug,
                            title: frontMatter.title || 'Untitled',
                            date: frontMatter.date || 'Unknown date',
                            content: markdownContent
                        };
                    }
                }
            }
            return null;
        }

        // Apply styling specifically for blog posts
        function applyPostStyling(container) {
            // Style headings
            container.querySelectorAll('h1').forEach(h1 => {
                h1.className = 'text-3xl sm:text-4xl font-light text-gray-900 mb-6 sm:mb-8 tracking-wide leading-tight';
            });

            container.querySelectorAll('h2').forEach(h2 => {
                h2.className = 'text-2xl sm:text-3xl font-medium text-gray-900 mb-5 sm:mb-6 mt-12 sm:mt-16 tracking-wide leading-tight';
            });

            container.querySelectorAll('h3').forEach(h3 => {
                h3.className = 'text-lg sm:text-xl font-medium text-gray-900 mb-3 sm:mb-4 mt-4 sm:mt-6 tracking-wide';
            });
            
            // Style paragraphs
            container.querySelectorAll('p').forEach(p => {
                p.className = 'text-gray-700 leading-loose mb-6 sm:mb-8 text-base sm:text-[1.0625rem]';
            });

            container.querySelectorAll('p').forEach(p => {
                if (p.nextElementSibling && ['OL', 'UL'].includes(p.nextElementSibling.tagName)) {
                    p.className = 'text-gray-700 leading-loose mb-2 sm:mb-3 text-base sm:text-[1.0625rem]';
                }
            });
            
            // Style links
            container.querySelectorAll('a').forEach(a => {
                a.className = 'text-blue-600 underline hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded';
            });
            
            // Style lists
            container.querySelectorAll('ol').forEach(ol => {
                ol.className = 'list-decimal pl-5 sm:pl-6 space-y-2 mb-5 sm:mb-6 text-gray-600';
            });

            container.querySelectorAll('ul').forEach(ul => {
                ul.className = 'list-disc pl-5 sm:pl-6 space-y-1.5 mb-5 sm:mb-6 text-gray-600';
            });
            
            container.querySelectorAll('li').forEach(li => {
                li.className = 'text-gray-700 leading-relaxed text-base sm:text-[1.0625rem] pl-1';
            });

            container.querySelectorAll('li p').forEach(p => {
                p.className = 'text-gray-600 leading-relaxed mb-2 text-sm sm:text-base';
            });

            container.querySelectorAll('strong').forEach(strong => {
                strong.className = 'font-semibold text-gray-800';
            });

            // Style blockquotes
            container.querySelectorAll('blockquote').forEach(bq => {
                bq.className = 'border-l-4 border-gray-300 pl-4 italic text-gray-600 mb-6';
            });

            // Style code blocks
            container.querySelectorAll('pre').forEach(pre => {
                pre.className = 'bg-gray-100 rounded-lg p-4 overflow-x-auto mb-6';
            });

            container.querySelectorAll('code').forEach(code => {
                if (code.parentElement.tagName !== 'PRE') {
                    code.className = 'bg-gray-100 rounded px-1 py-0.5 text-sm';
                }
            });
        }

        // Load and display the post
        async function displayPost() {
            const postKey = getPostKeyFromUrl();
            
            if (!postKey.slug && !postKey.id) {
                // No post ID, redirect to thoughts page
                window.location.href = 'thoughts.html';
                return;
            }
            
            const post = await loadPost(postKey);
            
            if (!post) {
                // Post not found, redirect to thoughts page
                window.location.href = 'thoughts.html';
                return;
            }

            const canonicalUrl = `https://www.wentongzhang.com/post.html?slug=${encodeURIComponent(post.slug)}`;
            const canonical = document.head.querySelector('link[rel="canonical"]');
            if (canonical) {
                canonical.href = canonicalUrl;
            }
            if (postKey.id && !postKey.slug) {
                window.history.replaceState(null, '', `post.html?slug=${encodeURIComponent(post.slug)}`);
            }
            updatePageMeta({
                title: post.title,
                description: excerptMarkdown(post.content, 160),
                url: canonicalUrl,
                type: 'article'
            });
            
            // Render the post
            const renderedPost = window.MtgContent
                ? window.MtgContent.renderMarkdown(post.content)
                : { html: marked.parse(post.content), decks: [] };
            
            const singlePostContent = document.getElementById('singlePostContent');
            singlePostContent.innerHTML = `
                <article class="max-w-[42rem]">
                    <div class="mb-5">
                        <time class="text-sm text-gray-500">${post.date}</time>
                    </div>
                    <h1 class="text-3xl sm:text-4xl font-light text-gray-900 mb-8 sm:mb-10 tracking-wide leading-tight">${post.title}</h1>
                    <div class="prose prose-lg max-w-none">${renderedPost.html}</div>
                </article>
            `;
            
            // Apply styling to the rendered content
            const contentDiv = singlePostContent.querySelector('.prose');
            contentDiv.__mtgDecks = renderedPost.decks;
            applyPostStyling(contentDiv);
            if (window.MtgContent) {
                window.MtgContent.enhanceMtgContent(contentDiv);
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            displayPost();
        });
    </script>
</body>
</html>
