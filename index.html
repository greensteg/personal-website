<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wentong Zhang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">
    <!-- Navigation will be inserted here by JavaScript -->

    <!-- About Page -->
    <section class="min-h-screen py-12 sm:py-20 pt-20 sm:pt-32">
        <div class="max-w-3xl mx-auto px-4 sm:px-6">
            <div id="aboutContent" class="max-w-2xl">
                <!-- About content will be loaded here -->
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/nav.js"></script>
    <script>
        // Initialize navigation
        initNavigation('about');

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderMarkdownContent('aboutContent', 'content/about.md');
        });
    </script>
</body>
</html>
