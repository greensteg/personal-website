<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wentong Zhang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-sm border-b border-gray-200 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <a href="#" onclick="navigateTo('about')" class="font-semibold text-lg">Wentong Zhang</a>
                <div class="space-x-6">
                    <a href="#" onclick="navigateTo('about')" class="nav-link text-gray-600 hover:text-gray-900 transition-colors">About</a>
                    <a href="#" onclick="navigateTo('thoughts')" class="nav-link text-gray-600 hover:text-gray-900 transition-colors">Thoughts</a>
                    <a href="#" onclick="navigateTo('contact')" class="nav-link text-gray-600 hover:text-gray-900 transition-colors">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- About Page -->
    <div id="about" class="page active">
        <section class="min-h-screen py-20 pt-32">
            <div class="max-w-4xl mx-auto px-6">
                <div id="aboutContent" class="max-w-2xl">
                    <!-- About content will be loaded here -->
                </div>
            </div>
        </section>
    </div>

    <!-- Thoughts Page -->
    <div id="thoughts" class="page">
        <section class="min-h-screen py-20 pt-32">
            <div class="max-w-4xl mx-auto px-6">
                <h1 class="text-4xl font-light mb-12 text-gray-900">Thoughts</h1>

                <!-- Blog Posts Container -->
                <div id="blogPosts">
                    <!-- Default posts will be loaded here -->
                </div>
            </div>
        </section>
    </div>

    <!-- Single Post View -->
    <div id="singlePost" class="page">
        <section class="min-h-screen py-20 pt-32">
            <div class="max-w-4xl mx-auto px-6">
                <button onclick="navigateTo('thoughts')" class="text-gray-600 hover:text-gray-900 mb-8 flex items-center">
                    ← Back to Thoughts
                </button>
                <div id="singlePostContent">
                    <!-- Single post content will be loaded here -->
                </div>
            </div>
        </section>
    </div>

    <!-- Contact Page -->
    <div id="contact" class="page">
        <section class="min-h-screen py-20 pt-32">
            <div class="max-w-4xl mx-auto px-6">
                <div id="contactContent" class="max-w-2xl">
                    <!-- Contact content will be loaded here -->
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Blog posts data (will be loaded from files)
        let blogPosts = [];

        // Simple markdown parser for front matter
        function parseFrontMatter(content) {
            if (!content.startsWith('---')) {
                return { frontMatter: {}, content: content };
            }
            
            const endIndex = content.indexOf('---', 3);
            if (endIndex === -1) {
                return { frontMatter: {}, content: content };
            }
            
            const frontMatterText = content.slice(3, endIndex).trim();
            const mainContent = content.slice(endIndex + 3).trim();
            
            const frontMatter = {};
            frontMatterText.split('\n').forEach(line => {
                const colonIndex = line.indexOf(':');
                if (colonIndex > 0) {
                    const key = line.slice(0, colonIndex).trim();
                    const value = line.slice(colonIndex + 1).trim().replace(/^["']|["']$/g, '');
                    frontMatter[key] = value;
                }
            });
            
            return { frontMatter, content: mainContent };
        }

        // Load content from markdown files
        async function loadContent(filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const content = await response.text();
                return content;
            } catch (error) {
                console.error(`Failed to load ${filePath}:`, error);
                return null;
            }
        }

        // Enhanced link handler for static links
        function handleStaticLinks(container) {
            // Handle all links in the container
            container.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                
                // Skip external links and mailto links
                if (!href || href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('#')) {
                    return;
                }
                
                // Handle internal navigation links
                if (href === '/about' || href === '/thoughts' || href === '/contact') {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        navigateTo(href.slice(1)); // Remove leading slash
                    });
                }
                
                // Handle blog post links (format: /thoughts/post-id)
                else if (href.startsWith('/thoughts/')) {
                    const postId = parseInt(href.split('/')[2]);
                    if (postId) {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            navigateTo('post', postId);
                        });
                    }
                }
                
                // Handle relative links by converting them to absolute internal links
                else if (!href.startsWith('/')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        // For relative links, assume they're internal navigation
                        if (href === 'about' || href === 'thoughts' || href === 'contact') {
                            navigateTo(href);
                        }
                    });
                }
            });
        }

        // Load and render markdown content
        async function renderMarkdownContent(containerId, filePath) {
            const content = await loadContent(filePath);
            
            if (!content) {
                const container = document.getElementById(containerId);
                container.innerHTML = '<p class="text-red-500">Error: Could not load content from ' + filePath + '</p>';
                return;
            }
            
            const { frontMatter, content: markdownContent } = parseFrontMatter(content);
            const html = marked.parse(markdownContent);
            
            const container = document.getElementById(containerId);
            container.innerHTML = html;
            
            // Apply styling to rendered content
            applyContentStyling(container);
            
            // Handle static links in the rendered content
            handleStaticLinks(container);
        }

        // Apply Tailwind styling to rendered markdown
        function applyContentStyling(container) {
            // Style headings
            container.querySelectorAll('h1').forEach(h1 => {
                h1.className = 'text-5xl font-light mb-6 text-gray-900';
                // Handle name styling in h1
                if (h1.textContent.includes("I'm Wentong Zhang.")) {
                    h1.innerHTML = h1.innerHTML.replace('Wentong Zhang', '<span class="font-medium">Wentong Zhang</span>');
                }
            });
            
            container.querySelectorAll('h2').forEach(h2 => {
                h2.className = 'font-medium text-gray-900 mb-4 text-lg';
            });
            
            container.querySelectorAll('h3').forEach(h3 => {
                h3.className = 'font-medium text-gray-900 mb-2';
            });
            
            // Style paragraphs
            container.querySelectorAll('p').forEach((p, index) => {
                if (index === 0 && container.id === 'aboutContent') {
                    p.className = 'text-xl text-gray-600 mb-8 leading-relaxed';
                } else {
                    p.className = 'text-gray-600 leading-relaxed mb-6';
                }
            });
            
            // Style links
            container.querySelectorAll('a').forEach(a => {
                a.className = 'text-gray-900 underline hover:text-gray-600 transition-colors';
            });
            
            // Style lists
            container.querySelectorAll('ul').forEach(ul => {
                ul.className = 'space-y-1';
            });
            
            container.querySelectorAll('li').forEach(li => {
                li.className = 'text-gray-600';
            });
        }

        // Auto-discover blog posts from index file
        async function discoverBlogPosts() {
            try {
                const response = await fetch('content/posts/index.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const postsIndex = await response.json();
                return postsIndex.posts || [];
            } catch (error) {
                console.error('Failed to load posts index:', error);
                return [];
            }
        }

        // Load blog posts from markdown files
        async function loadBlogPosts() {
            blogPosts = [];
            
            const postFiles = await discoverBlogPosts();
            
            for (const postFile of postFiles) {
                const content = await loadContent(postFile);
                if (content) {
                    const { frontMatter, content: markdownContent } = parseFrontMatter(content);
                    blogPosts.push({
                        id: parseInt(frontMatter.id) || Date.now(),
                        title: frontMatter.title || 'Untitled',
                        date: frontMatter.date || 'Unknown date',
                        content: markdownContent,
                        slug: frontMatter.slug || postFile.split('/').pop().replace('.md', '')
                    });
                }
            }
            
            // Sort posts by date (newest first)
            blogPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderBlogPosts();
        }

        // URL routing and navigation (hash-based)
        function navigateTo(page, postId = null) {
            let hash;
            
            switch(page) {
                case 'about':
                    hash = '#/about';
                    break;
                case 'thoughts':
                    hash = '#/thoughts';
                    break;
                case 'contact':
                    hash = '#/contact';
                    break;
                case 'post':
                    hash = `#/thoughts/${postId}`;
                    break;
                default:
                    hash = '#/about';
            }
            
            // Update URL hash
            window.location.hash = hash;
        }

        // Handle hash changes
        window.addEventListener('hashchange', function() {
            handleHashRoute();
        });

        // Parse hash and show appropriate page
        function handleHashRoute() {
            const hash = window.location.hash.slice(1) || '/about'; // Remove # and default to /about
            
            if (hash === '/about' || hash === '/') {
                showPage('about');
            } else if (hash === '/thoughts') {
                showPage('thoughts');
            } else if (hash === '/contact') {
                showPage('contact');
            } else if (hash.startsWith('/thoughts/')) {
                const postId = parseInt(hash.split('/')[2]);
                if (postId && blogPosts.find(p => p.id === postId)) {
                    showSinglePost(postId);
                } else {
                    // Invalid post ID, redirect to thoughts
                    navigateTo('thoughts');
                }
            } else {
                // Unknown route, redirect to about
                navigateTo('about');
            }
        }

        function handleInitialRoute() {
            handleHashRoute();
        }

        // Page management - loads content from files only
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // Show selected page
            document.getElementById(pageId).classList.add('active');
            
            // Load content for the page from files
            if (pageId === 'about') {
                renderMarkdownContent('aboutContent', 'content/about.md');
            } else if (pageId === 'contact') {
                renderMarkdownContent('contactContent', 'content/contact.md');
            }
            
            // Update navigation active state
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('text-gray-900', 'font-medium');
                link.classList.add('text-gray-600');
            });
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        // Blog functionality
        function renderBlogPosts() {
            const container = document.getElementById('blogPosts');
            container.innerHTML = '';
            
            blogPosts.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(post => {
                const postElement = document.createElement('article');
                postElement.className = 'bg-white rounded-lg p-8 mb-8 shadow-sm cursor-pointer hover:shadow-md transition-shadow';
                
                // Create preview (first 3 lines or ~150 characters)
                const lines = post.content.split('\n').filter(line => line.trim() !== '');
                const preview = lines.slice(0, 3).join('\n');
                const truncatedPreview = preview.length > 150 ? preview.substring(0, 150) + '...' : preview + '...';
                
                postElement.innerHTML = `
                    <div class="mb-4">
                        <time class="text-sm text-gray-500">${post.date}</time>
                    </div>
                    <h3 class="text-xl font-medium text-gray-900 mb-4">${post.title}</h3>
                    <div class="text-gray-600 leading-relaxed whitespace-pre-line mb-4">${truncatedPreview}</div>
                    <span class="text-gray-900 font-medium hover:text-gray-600 transition-colors">Read more →</span>
                `;
                
                postElement.onclick = () => navigateTo('post', post.id);
                container.appendChild(postElement);
            });
        }

        function showSinglePost(postId) {
            const post = blogPosts.find(p => p.id === postId);
            if (!post) {
                navigateTo('thoughts');
                return;
            }
            
            const singlePostContent = document.getElementById('singlePostContent');
            
            // Render the post content as markdown
            const postHtml = marked.parse(post.content);
            
            singlePostContent.innerHTML = `
                <article class="max-w-3xl">
                    <div class="mb-6">
                        <time class="text-sm text-gray-500">${post.date}</time>
                    </div>
                    <h1 class="text-3xl font-light text-gray-900 mb-8">${post.title}</h1>
                    <div class="prose prose-lg max-w-none">${postHtml}</div>
                </article>
            `;
            
            // Apply styling to the rendered content
            const contentDiv = singlePostContent.querySelector('.prose');
            applyContentStyling(contentDiv);
            
            // Handle static links in the post content
            handleStaticLinks(contentDiv);
            
            // Hide all pages and show single post
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('singlePost').classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        // Initialize the site
        document.addEventListener('DOMContentLoaded', function() {
            loadBlogPosts();
            // Handle initial route based on hash
            handleInitialRoute();
        });
    </script>
</body>
</html>
