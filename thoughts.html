<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - Wentong Zhang</title>
    <meta name="description" content="Essays and notes by Wentong Zhang.">
    <link rel="canonical" href="https://www.wentongzhang.com/thoughts.html">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <meta property="og:title" content="Thoughts - Wentong Zhang">
    <meta property="og:description" content="Essays and notes by Wentong Zhang.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.wentongzhang.com/thoughts.html">
    <meta property="og:site_name" content="Wentong Zhang">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Thoughts - Wentong Zhang">
    <meta name="twitter:description" content="Essays and notes by Wentong Zhang.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">
    <!-- Navigation will be inserted here by JavaScript -->

    <!-- Thoughts Page -->
    <section class="min-h-screen py-12 sm:py-20 pt-20 sm:pt-32">
        <div class="max-w-3xl mx-auto px-4 sm:px-6">
            <div class="max-w-2xl mb-10 sm:mb-12">
                <h1 class="text-3xl sm:text-4xl font-light text-gray-900 tracking-wide mb-4">Thoughts</h1>
                <p class="text-gray-600 leading-loose text-sm sm:text-base">Essays and notes on software, systems, games, and whatever else I can’t stop thinking about.</p>
            </div>
            <!-- Blog Posts Container -->
            <div id="blogPosts">
                <div class="space-y-4">
                    <div class="bg-white border border-gray-100 rounded-lg p-6 sm:p-8 shadow-sm">
                        <p class="text-gray-500 text-sm sm:text-base">Loading posts...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="shared/meta.js"></script>
    <script src="shared/utils.js"></script>
    <script src="shared/nav.js"></script>
    <script>
        // Initialize navigation
        initNavigation('thoughts');

        // Blog posts data
        let blogPosts = [];

        function parseTags(frontMatter, markdownContent) {
            if (frontMatter.tags) {
                return String(frontMatter.tags).split(',').map(tag => tag.trim()).filter(Boolean);
            }

            if (markdownContent.includes('[[']) || markdownContent.includes('```deck')) {
                return ['Magic'];
            }

            return [];
        }

        // Auto-discover blog posts from index file
        async function discoverBlogPosts() {
            try {
                const response = await fetch('content/posts/index.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const postsIndex = await response.json();
                return postsIndex.posts || [];
            } catch (error) {
                console.error('Failed to load posts index:', error);
                return [];
            }
        }

        // Load blog posts from markdown files
        async function loadBlogPosts() {
            blogPosts = [];

            const postFiles = await discoverBlogPosts();

            for (const postFile of postFiles) {
                const content = await loadContent(postFile);
                if (content) {
                    const { frontMatter, content: markdownContent } = parseFrontMatter(content);
                    // Only include posts where display is true or undefined (default to true for backwards compatibility)
                    const shouldDisplay = frontMatter.display !== false;
                    if (shouldDisplay) {
                        blogPosts.push({
                            id: parseInt(frontMatter.id) || Date.now(),
                            title: frontMatter.title || 'Untitled',
                            date: frontMatter.date || 'Unknown date',
                            content: markdownContent,
                            slug: frontMatter.slug || postFile.split('/').pop().replace('.md', ''),
                            tags: parseTags(frontMatter, markdownContent)
                        });
                    }
                }
            }

            // Sort posts by date (newest first)
            blogPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderBlogPosts();
        }

        // Blog functionality
        function renderBlogPosts() {
            const container = document.getElementById('blogPosts');
            container.innerHTML = '';

            // Check if there are no posts to display
            if (blogPosts.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg p-6 sm:p-8 shadow-sm text-center">
                        <p class="text-gray-600 text-base sm:text-lg">Check back later for posts, nothing here currently.</p>
                    </div>
                `;
                return;
            }

            blogPosts.forEach(post => {
                const postElement = document.createElement('article');
                postElement.className = 'group bg-white border border-gray-100 rounded-lg p-5 sm:p-7 mb-5 sm:mb-6 shadow-sm cursor-pointer hover:shadow-md hover:border-blue-100 transition-all duration-200 focus-within:ring-2 focus-within:ring-blue-500 focus-within:ring-offset-2';

                const preview = excerptMarkdown(post.content, 210);
                const tagHtml = post.tags.map(tag => `<span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${tag}</span>`).join('');

                postElement.innerHTML = `
                    <div class="mb-3 flex flex-wrap items-center gap-2">
                        <time class="text-xs sm:text-sm text-gray-500">${post.date}</time>
                        ${tagHtml ? `<span class="text-gray-300">/</span><div class="flex flex-wrap gap-2">${tagHtml}</div>` : ''}
                    </div>
                    <h2 class="text-xl sm:text-2xl font-medium text-gray-900 mb-3 tracking-wide group-hover:text-blue-700 transition-colors duration-200">${post.title}</h2>
                    <p class="text-gray-600 leading-relaxed mb-4 text-sm sm:text-base">${preview}</p>
                    <span class="text-blue-600 font-medium group-hover:text-blue-700 transition-colors duration-200 text-sm sm:text-base">Read more →</span>
                `;

                postElement.onclick = () => {
                    window.location.href = `post.html?slug=${encodeURIComponent(post.slug)}`;
                };
                postElement.tabIndex = 0;
                postElement.setAttribute('role', 'link');
                postElement.setAttribute('aria-label', `Read ${post.title}`);
                postElement.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        window.location.href = `post.html?slug=${encodeURIComponent(post.slug)}`;
                    }
                });
                container.appendChild(postElement);
            });
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadBlogPosts();
        });
    </script>
</body>
</html>
